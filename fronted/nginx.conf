server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression for faster transfers
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Vue SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to backend API
    # Containerfile uses a shell CMD so we can resolve BACKEND_URL at startup
    location /chat {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering so streamed chunks arrive immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}